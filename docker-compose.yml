services:
  smtp4dev:
    image: rnwood/smtp4dev
    ports:
      - "5025:80"   # Web UI: http://localhost:5025 to view caught emails
      - "2525:25"   # SMTP (use Host=localhost, Port=2525 in appsettings)
    # No auth required; all emails are caught for viewing in the UI.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coachsub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=coachsub;Username=postgres;Password=postgres"
      Jwt__Key: "prod-key-min-32-chars-long-secret!!"
      Jwt__Issuer: "CoachSubscription"
      Jwt__Audience: "CoachSubscription"
      Cors__Origins: "http://localhost:5173,http://localhost"
      SeedData__Enabled: "false"
      Smtp__Host: "smtp4dev"
      Smtp__Port: "25"
      Smtp__UseSsl: "false"
      Smtp__From: "noreply@coachsub.local"
    depends_on:
      postgres:
        condition: service_healthy
      smtp4dev: {}
    ports:
      - "5000:8080"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    depends_on:
      - api
    environment:
      API_BASE_URL: "http://api:8080"
    ports:
      - "80:80"

volumes:
  postgres_data:
